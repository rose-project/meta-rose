# ROSE distribution
DISTRO = "rose"
DISTRO_NAME = "ROSE"
DISTRO_VERSION = "0.1"
SDK_VERSION = "${DISTRO_VERSION}"

DISTRO_FEATURES ?= "acl alsa bluetooth debuginfod ext2 ipv4 ipv6 usbgadget usbhost wifi xattr nfs pci vfat vulkan opengl"

# As of Yocto 6.0 (wrynose) the set DISTRO_FEATURES_DEFAULTS is backfilled onto
# DISTRO_FEATURES automatically (bitbake.conf: DISTRO_FEATURES:append via
# filter_default_features). Opt out of the defaults rose does not use: graphics
# are KMS/DRM + wayland (no X11), audio is ALSA (no PulseAudio), and we have no
# cellular/NFC/mDNS needs. wayland and the hygiene defaults (seccomp, ldconfig,
# multiarch, ptest, gobject-introspection-data) are kept.
DISTRO_FEATURES_OPTED_OUT = "x11 pulseaudio 3g nfc zeroconf"

INIT_MANAGER ?= "sysvinit"
